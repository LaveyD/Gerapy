name: build
on: 
  push:
    branches: 
    - master
    - dev
  pull_request:
    branches:
    - master

env:
  POETRY_VERSION: "1.3.1"

jobs:
  test-on-linux:
    runs-on: 
    - ubuntu-latest
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_DB: gerapy
          POSTGRES_USER: gerapy
          POSTGRES_PASSWORD: gerapy
        options: >-
          --health-cmd "pg_isready -U gerapy -d gerapy"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
        - 5432:5432
    strategy:
      max-parallel: 3
      matrix:
        python-version: [3.7, 3.8]
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Set up Poetry ${{ env.POETRY_VERSION }} with Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install poetry
      # see https://github.com/marketplace/actions/setup-poetry
      uses: Gr1N/setup-poetry@v7
      with:
        poetry-version: ${{ env.POETRY_VERSION }}
    - name: Install dependencies
      run: poetry install --no-root
    - name: Build wheel
      run: poetry build --format wheel
    - name: Install Gerapy
      run: pip install dist/gerapy-*.whl
    - name: Run Gerapy
      env:
        PATH: "/root/.local/bin:$PATH"
        DB_ENGINE: "django.db.backends.postgresql"
        DB_HOST: "127.0.0.1"
        DB_PORT: "5432"
        DB_NAME: "gerapy"
        DB_USER: "gerapy"
        DB_PASSWORD: "gerapy"
      run: |
        gerapy -v
        gerapy init
        cd gerapy
        gerapy migrate
        gerapy initadmin
